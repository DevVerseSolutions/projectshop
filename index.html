<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #ffffff; }
    </style>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

    <!-- নোটিস বার -->
    <div class="bg-green-600 text-white text-center py-2 px-4 text-sm font-semibold tracking-wide">
         আপনার ইচ্ছা মতন আপনি ওয়েবসাইট বা Apps তৈরি করে নিতে পারবেন আমাদের কাছ থেকে!
    </div>

    <!-- হেডার -->
    <header class="border-b border-gray-200 py-6 sticky top-0 bg-white z-40 shadow-sm">
        <div class="container mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-green-700">Project Store</h1>
                <p class="text-xs text-gray-500">আবার ফিরে আসার জন্য ধন্যবাদ</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="openSupportModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-5 rounded-lg border border-gray-300 transition">
                    📞 সাপোর্ট (Support)
                </button>
                <a id="nav-order-btn" href="#" target="_blank" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-lg shadow transition transform hover:scale-105 inline-block">
                    🛒 অর্ডার করুন
                </a>
            </div>
        </div>
    </header>

    <!-- প্রজেক্ট গ্রিড -->
    <main class="container mx-auto px-4 py-10 flex-grow">
        <h2 class="text-xl font-bold text-gray-700 mb-6 border-l-4 border-green-600 pl-2">আমাদের প্রজেক্ট সমূহ</h2>
        
        <div id="loading" class="text-center py-10 font-semibold text-gray-500">লোড হচ্ছে...</div>

        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </main>

    <!-- ভিউ মোডাল (ইমেজ স্লাইডার সহ) -->
    <div id="view-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[95vh] overflow-y-auto p-6 relative shadow-2xl">
            <button onclick="closeViewModal()" class="absolute top-4 right-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-full w-8 h-8 flex items-center justify-center font-bold text-xl z-10">&times;</button>
            
            <!-- স্লাইডার এরিয়া -->
            <div class="relative w-full h-64 md:h-80 bg-gray-100 rounded-lg mb-4 overflow-hidden group border">
                <img id="modal-slider-img" src="" alt="Project Screenshot" class="w-full h-full object-contain">
                
                <!-- নেভিগেশন বাটনসমূহ -->
                <button onclick="prevImage()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 hover:bg-opacity-70 text-white p-2 rounded-full font-bold text-lg focus:outline-none">❮</button>
                <button onclick="nextImage()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 hover:bg-opacity-70 text-white p-2 rounded-full font-bold text-lg focus:outline-none">❯</button>
                
                <!-- ইমেজ কাউন্টার ইন্ডিকেটর -->
                <div id="image-counter" class="absolute bottom-2 right-2 bg-black bg-opacity-60 text-white px-2 py-1 text-xs rounded font-semibold">১/১</div>
            </div>

            <h3 id="modal-title" class="text-2xl font-bold text-green-700 mb-2"></h3>
            
            <div class="flex gap-4 mb-4 text-sm font-semibold">
                <span class="text-green-600 bg-green-50 px-3 py-1 rounded" id="modal-price-bdt"></span>
                <span class="text-blue-600 bg-blue-50 px-3 py-1 rounded" id="modal-price-usd"></span>
            </div>
            
            <p id="modal-desc" class="text-gray-600 leading-relaxed mb-6 whitespace-pre-line"></p>
            
            <div class="border-t pt-4 flex justify-end">
                <a id="modal-order-link" href="#" target="_blank" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-lg shadow transition inline-block">
                    🛒 অর্ডার করুন
                </a>
            </div>
        </div>
    </div>

    <!-- সাপোর্ট মোডাল -->
    <div id="support-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl max-w-md w-full p-6 relative shadow-2xl">
            <button onclick="closeSupportModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            <h3 class="text-xl font-bold text-gray-800 mb-2 border-b pb-2 text-center text-green-700">আমাদের অফিশিয়াল সাপোর্ট</h3>
            <div class="space-y-3 mt-4">
                <a id="link-tg-channel" href="#" target="_blank" class="flex items-center justify-between p-3 bg-blue-50 hover:bg-blue-100 rounded-lg text-blue-700 font-semibold transition"><span>📢 টেলিগ্রাম চ্যানেল</span>➔</a>
                <a id="link-tg-admin" href="#" target="_blank" class="flex items-center justify-between p-3 bg-cyan-50 hover:bg-cyan-100 rounded-lg text-cyan-700 font-semibold transition"><span>🧑‍💻 এডমিন আইডি</span>➔</a>
                <a id="link-fb-page" href="#" target="_blank" class="flex items-center justify-between p-3 bg-indigo-50 hover:bg-indigo-100 rounded-lg text-indigo-700 font-semibold transition"><span>📘 ফেসবুক পেজ</span>➔</a>
                <a id="link-yt-channel" href="#" target="_blank" class="flex items-center justify-between p-3 bg-red-50 hover:bg-red-100 rounded-lg text-red-700 font-semibold transition"><span>🔴 ইউটিউব চ্যানেল</span>➔</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        // রিয়েলটাইম ডেটাবেস মডিউল ইমপোর্ট করা হলো
        import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
  apiKey: "AIzaSyBnRAb4evxkfnJRHHARS1lGQfnnLq1bJI0",
  authDomain: "projectshop-26319.firebaseapp.com",
  databaseURL: "https://projectshop-26319-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "projectshop-26319",
  storageBucket: "projectshop-26319.firebasestorage.app",
  messagingSenderId: "381864277377",
  appId: "1:381864277377:web:c3a1018bfa65fe6108e480",
  measurementId: "G-3L1T3G84NT"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db);

        window.currentProjects = [];

        async function initApp() {
            try {
                const settingsSnap = await get(child(dbRef, "settings/links"));
                if (settingsSnap.exists()) {
                    const links = settingsSnap.val();
                    if(links.telegram_order) {
                        document.getElementById('nav-order-btn').href = links.telegram_order;
                        document.getElementById('modal-order-link').href = links.telegram_order;
                    }
                    if(links.telegram_channel) document.getElementById('link-tg-channel').href = links.telegram_channel;
                    if(links.telegram_admin) document.getElementById('link-tg-admin').href = links.telegram_admin;
                    if(links.facebook_page) document.getElementById('link-fb-page').href = links.facebook_page;
                    if(links.youtube_channel) document.getElementById('link-yt-channel').href = links.youtube_channel;
                }

                const snapshot = await get(child(dbRef, "projects"));
                const container = document.getElementById('project-container');
                const loading = document.getElementById('loading');
                
                container.innerHTML = '';
                if(!snapshot.exists()) { loading.innerHTML = "কোনো প্রজেক্ট পাওয়া যায়নি।"; return; }

                const projectsData = snapshot.val();
                Object.keys(projectsData).forEach((key) => {
                    const project = projectsData[key];
                    project.id = key;
                    window.currentProjects.push(project);

                    const cardImg = (project.images && project.images.length > 0) ? project.images[0] : 'https://via.placeholder.com/400x250';

                    const cardHTML = `
                        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition">
                            <img src="${cardImg}" alt="${project.name}" class="w-full h-48 object-cover">
                            <div class="p-5">
                                <h3 class="text-lg font-bold text-gray-800 mb-2 line-clamp-1">${project.name}</h3>
                                <div class="flex justify-between items-center mb-4 text-sm font-semibold">
                                    <span class="text-green-600">৳ ${project.price_bdt} টাকা</span>
                                    <span class="text-blue-600">$ ${project.price_usd} USD</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="openViewModal('${project.id}')" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg text-center transition">👁️ ভিউ (View)</button>
                                    <a href="${document.getElementById('nav-order-btn').href}" target="_blank" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 rounded-lg text-center transition">অর্ডার করুন</a>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });

                loading.classList.add('hidden');
                container.classList.remove('hidden');
            } catch (error) { console.error(error); }
        }
        window.addEventListener('DOMContentLoaded', initApp);
    </script>

    <!-- স্লাইডার এবং মোডাল কন্ট্রোল লজিক -->
    <script>
        let activeImages = [];
        let currentImgIndex = 0;

        function openViewModal(id) {
            const project = window.currentProjects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('modal-title').innerText = project.name;
            document.getElementById('modal-price-bdt').innerText = `৳ ${project.price_bdt} টাকা`;
            document.getElementById('modal-price-usd').innerText = `$ ${project.price_usd} USD`;
            document.getElementById('modal-desc').innerText = project.description;

            activeImages = project.images || ['https://via.placeholder.com/400x250'];
            currentImgIndex = 0;
            updateSliderImage();

            document.getElementById('view-modal').classList.remove('hidden');
        }

        function updateSliderImage() {
            if(activeImages.length === 0) return;
            document.getElementById('modal-slider-img').src = activeImages[currentImgIndex];
            document.getElementById('image-counter').innerText = `${currentImgIndex + 1} / ${activeImages.length}`;
        }

        function nextImage() {
            if(activeImages.length <= 1) return;
            currentImgIndex = (currentImgIndex + 1) % activeImages.length;
            updateSliderImage();
        }

        function prevImage() {
            if(activeImages.length <= 1) return;
            currentImgIndex = (currentImgIndex - 1 + activeImages.length) % activeImages.length;
            updateSliderImage();
        }

        function closeViewModal() { document.getElementById('view-modal').classList.add('hidden'); }
        function openSupportModal() { document.getElementById('support-modal').classList.remove('hidden'); }
        function closeSupportModal() { document.getElementById('support-modal').classList.add('hidden'); }
    </script>
</body>
</html>
